<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>
  <link rel="stylesheet" href="/css/community.css">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<div th:replace="~{fragments/topmenu :: topmenu-section}"></div>
<div th:replace="~{fragments/topmenu :: header}"></div>

<main class="container">
  <h1>게시글 작성</h1>

  <form action="#" th:action="@{/posts/community/save}" th:object="${communityForm}" method="post">
    <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />

    <div>
      <label>제목</label>
      <input type="text" th:field="*{title}" />
      <div class="field-err" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>
    <div>
      <label for="writer">작성자</label>
      <input type="text" id="writer" th:field="*{writer}" readonly />
    </div>
    <div>
      <label>내용</label>
      <textarea th:field="*{content}"></textarea>
      <div class="field-err" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
    </div>
    <button type="submit">저장</button>
    <button type="button" onclick="location.href='/posts/community'">취소</button>
  </form>
</main>
</body>
</html>
