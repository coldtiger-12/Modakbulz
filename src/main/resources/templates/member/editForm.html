<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf?.token}"/>
  <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
  <title>마이페이지 - 회원정보 수정</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body>
<div th:replace="~{fragments/topmenu :: topmenu-section}"></div>
<div th:replace="~{fragments/topmenu :: header}"></div>

<div class="mypage-container">
  <aside class="mypage-sidebar">
    <ul>
      <li class="now"><a href="/mypage/edit">회원정보 관리</a></li>
      <li><a href="/mypage/likes">찜한 캠핑장</a></li>
      <li><a href="/mypage/posts">내가 쓴 게시글</a></li>
      <li><a href="/mypage/inquiry">문의사항</a></li>
    </ul>
  </aside>

  <section class="mypage-main">
    <div th:if="${param.success}" style="color: green; margin-bottom: 15px;">
      회원정보가 성공적으로 수정되었습니다.
    </div>
    <div th:if="${param.error}" style="color: red; margin-bottom: 15px;">
      오류가 발생했습니다. 다시 시도해주세요.
    </div>

    <h2>회원정보 관리</h2>
    <form id="editForm" th:object="${editForm}" th:action="@{/mypage/edit}" method="post">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

      <div class="form-group">
        <label th:for="id">아이디 (수정 불가)</label>
        <input type="text" th:field="*{id}" readonly class="readonly-input">
      </div>
      <div class="form-group">
        <label th:for="nickname">닉네임 :</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" th:field="*{nickname}" id="nickname-edit">
          <button type="button" class="btn-send-auth" onclick="checkNicknameEdit()">중복 확인</button>
        </div>
        <div id="nickname-check-msg-edit" class="field-err"></div>
      </div>
      <div class="form-group">
        <label th:for="tel">전화번호 :</label>
        <input type="tel" th:field="*{tel}">
        <div class="field-err" th:if="${#fields.hasErrors('tel')}" th:errors="*{tel}"></div>
      </div>
      <div class="form-group">
        <label>지역</label>
        <select th:field="*{region}">
          <option value="">=====선택=====</option>
          <option value="서울">서울</option>
          <option value="부산">부산</option>
          <option value="대구">대구</option>
          <option value="인천">인천</option>
          <option value="광주">광주</option>
          <option value="대전">대전</option>
          <option value="울산">울산</option>
        </select>
      </div>

      <div class="form-group">
        <h2>비밀번호 변경을 위해선 이메일 인증이 필요합니다</h2>
        <label th:for="email">이메일</label>
        <div style="display: flex; gap: 10px;">
          <input type="email" th:field="*{email}" id="email-edit" readonly class="readonly-input">
          <button type="button" class="btn-send-auth" onclick="sendAuthEmailForEdit()">인증번호 발송</button>
        </div>
        <div id="auth-code-section-edit" class="hidden" style="margin-top:10px;">
          <input type="text" id="authCodeInput-edit" placeholder="인증번호 6자리를 입력하세요">
          <button type="button" class="btn-send-auth" onclick="verifyAuthCodeForEdit()">인증 확인</button>
        </div>
        <div class="field-err" th:if="${#fields.hasErrors('email')}" th:text="${#fields.errors('email')[0]}"></div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-submit">회원정보 저장</button>
      </div>
    </form>

    <form id="passwordForm" class="hidden" th:object="${editForm_Pwd}" th:action="@{/mypage/password}" method="post">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" th:field="*{pwd}" placeholder="새 비밀번호를 입력하세요">
        <div class="field-err" th:if="${#fields.hasErrors('pwd')}" th:errors="*{pwd}"></div>
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" th:field="*{pwdCheck}" placeholder="새 비밀번호를 다시 입력하세요">
        <div class="field-err" th:if="${#fields.hasErrors('pwdCheck')}" th:errors="*{pwdCheck}"></div>
      </div>
      <div class="button-group">
        <button type="submit" class="btn-submit">비밀번호 변경</button>
      </div>
    </form>

    <hr style="margin: 30px 0;">

    <h2>회원 탈퇴</h2>
    <form th:action="@{/mypage/delete}" method="post" onsubmit="return confirm('정말로 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
      <p style="margin-bottom: 15px;">계정을 삭제하면 회원님의 모든 정보가 영구적으로 사라지며, 복구할 수 없습니다.</p>
      <div class="button-group">
        <button type="submit" class="btn-delete">회원 탈퇴</button>
      </div>
    </form>
  </section>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  document.addEventListener("DOMContentLoaded", function() {
      // Thymeleaf 변수를 JavaScript 변수로 안전하게 전달
      const csrfToken = /*[[${_csrf.token}]]*/ null;
      const csrfHeader = /*[[${_csrf.headerName}]]*/ null;
      let isEmailVerified = false;

      window.checkNicknameEdit = function() {
          const nickname = document.getElementById('nickname-edit').value;
          const msgDiv = document.getElementById('nickname-check-msg-edit');
          if (!nickname) {
              msgDiv.innerText = '닉네임을 입력해주세요.';
              msgDiv.style.color = 'red';
              return;
          }

          const headers = { 'Content-Type': 'application/json' };
          if (csrfHeader && csrfToken) {
              headers[csrfHeader] = csrfToken;
          }

          fetch('/member/check-nickname', {
              method: 'POST',
              headers: headers,
              body: JSON.stringify({ nickname: nickname }),
          })
          .then(response => response.json())
          .then(data => {
              if (data.available) {
                  msgDiv.innerText = '사용 가능한 닉네임입니다.';
                  msgDiv.style.color = 'green';
              } else {
                  msgDiv.innerText = '이미 사용 중인 닉네임입니다.';
                  msgDiv.style.color = 'red';
              }
          })
          .catch(error => console.error('Error:', error));
      }

      window.sendAuthEmailForEdit = function() {
          const emailInput = document.getElementById('email-edit');
          const email = emailInput.value;
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
              alert('올바른 이메일 주소를 입력해주세요.');
              return;
          }

          const headers = { 'Content-Type': 'application/json' };
          if (csrfHeader && csrfToken) {
              headers[csrfHeader] = csrfToken;
          }

          fetch('/member/email/verification-requests', {
              method: 'POST',
              headers: headers,
              body: JSON.stringify({ email: email }),
          })
          .then(response => {
              if (response.ok) {
                  alert('인증번호가 발송되었습니다. 이메일을 확인해주세요.');
                  document.getElementById('auth-code-section-edit').classList.remove('hidden');
              } else {
                  alert('인증번호 발송에 실패했습니다. 이미 가입된 이메일일 수 있습니다.');
              }
          })
          .catch(error => console.error('Error:', error));
      }

      window.verifyAuthCodeForEdit = function() {
          const authCode = document.getElementById('authCodeInput-edit').value;
          if (!authCode) {
              alert('인증번호를 입력해주세요.');
              return;
          }

          const headers = {'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'};
          if (csrfHeader && csrfToken) {
              headers[csrfHeader] = csrfToken;
          }

          fetch('/member/verify-email', {
              method: 'POST',
              headers: headers,
              body: new URLSearchParams({ authcode: authCode }),
          })
          .then(response => response.json())
          .then(data => {
              if (data.verified) {
                  alert('이메일 인증이 완료되었습니다.');
                  isEmailVerified = true;
                  const emailInput = document.getElementById('email-edit');
                  emailInput.setAttribute('readonly', true);
                  emailInput.classList.add('readonly-input');
                  document.getElementById('auth-code-section-edit').classList.add('hidden');
                  document.getElementById('passwordForm').classList.remove('hidden');
              } else {
                  alert('인증번호가 올바르지 않거나 유효시간이 초과되었습니다.');
              }
          })
          .catch(error => console.error('Error:', error));
      }

      document.getElementById('editForm').addEventListener('submit', function(event) {
          if (!isEmailVerified) {
              alert('이메일 인증을 완료해주세요.');
              event.preventDefault(); // 폼 제출 막기
          }
      });
  });
  /*]]>*/
</script>
</body>
</html>
